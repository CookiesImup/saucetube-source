<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SauceTube — TikTok</title>
  <link rel="icon" type="image/jpeg" href="/thumbnail.jpg"/>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c10;
      --surface: rgba(255,255,255,0.045);
      --surface-h: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.07);
      --border-s: rgba(255,255,255,0.13);
      --text: #f2f2f7;
      --muted: rgba(242,242,247,0.45);
      --dim: rgba(242,242,247,0.22);
      --pink: #ff2d55;
      --cyan: #32ade6;
      --accent: #ff3b30;
      --shadow: 0 12px 48px rgba(0,0,0,0.7);
      --r: 18px;
      --r-sm: 11px;
    }

    [data-theme="light"] {
      --bg: #ececf1;
      --surface: rgba(255,255,255,0.65);
      --surface-h: rgba(255,255,255,0.85);
      --border: rgba(0,0,0,0.07);
      --border-s: rgba(0,0,0,0.13);
      --text: #0c0c10;
      --muted: rgba(12,12,16,0.5);
      --dim: rgba(12,12,16,0.25);
      --shadow: 0 12px 48px rgba(0,0,0,0.13);
    }

    html, body {
      min-height: 100vh;
      font-family: 'Geist', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: background 0.35s, color 0.35s;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 65% 50% at 10% 5%, rgba(255,45,85,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 55% at 90% 90%, rgba(50,173,230,0.06) 0%, transparent 60%);
    }

    .wrap {
      position: relative; z-index: 1;
      max-width: 600px; margin: 0 auto;
      padding: 40px 18px 80px;
      display: flex; flex-direction: column; gap: 20px;
    }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      animation: up 0.4s ease both;
    }

    .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }

    .brand-logo {
      width: 34px; height: 34px; border-radius: 8px;
      overflow: hidden; border: 1px solid var(--border-s); flex-shrink: 0;
    }

    .brand-logo img { width: 100%; height: 100%; object-fit: cover; }

    .brand-name {
      font-family: 'Geist Mono', monospace;
      font-size: 15px; font-weight: 600;
      letter-spacing: -0.02em; color: var(--text);
    }

    .brand-name span { color: var(--accent); }

    .brand-sub {
      font-family: 'Geist Mono', monospace;
      font-size: 9px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--pink);
    }

    .theme-btn {
      width: 42px; height: 25px;
      background: var(--surface); border: 1px solid var(--border-s);
      border-radius: 100px; cursor: pointer; position: relative;
      backdrop-filter: blur(12px); transition: background 0.3s;
      flex-shrink: 0;
    }

    .theme-btn::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 17px; height: 17px; border-radius: 50%;
      background: var(--text);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }

    [data-theme="light"] .theme-btn::after { transform: translateX(17px); }

    .hero { padding: 8px 0 4px; animation: up 0.4s 0.06s ease both; }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px;
      background: rgba(255,45,85,0.1);
      border: 1px solid rgba(255,45,85,0.22);
      border-radius: 100px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--pink); margin-bottom: 14px;
    }

    .badge-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--pink);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .hero h1 {
      font-size: clamp(28px, 7vw, 46px);
      font-weight: 300; line-height: 1.1; letter-spacing: -0.03em;
    }

    .hero h1 em { font-style: normal; color: var(--pink); }
    .hero h1 strong { font-weight: 600; }
    .hero p { margin-top: 10px; font-size: 12px; color: var(--muted); letter-spacing: 0.03em; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      backdrop-filter: blur(28px) saturate(1.5);
      -webkit-backdrop-filter: blur(28px) saturate(1.5);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.055);
      overflow: hidden;
      animation: up 0.4s 0.12s ease both;
    }

    [data-theme="light"] .card {
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.85);
    }

    .url-section { padding: 20px 20px 16px; }

    .url-label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
    }

    .url-row { display: flex; gap: 8px; }

    .url-input {
      flex: 1; padding: 12px 14px;
      background: var(--surface-h);
      border: 1px solid var(--border-s);
      border-radius: var(--r-sm);
      font-family: 'Geist Mono', monospace;
      font-size: 12px; color: var(--text); outline: none;
      transition: border-color 0.2s;
    }

    .url-input::placeholder { color: var(--dim); }
    .url-input:focus { border-color: var(--pink); }

    .paste-btn {
      padding: 0 14px;
      background: var(--surface-h);
      border: 1px solid var(--border-s);
      border-radius: var(--r-sm);
      font-family: 'Geist Mono', monospace;
      font-size: 11px; font-weight: 500; color: var(--muted);
      cursor: pointer; white-space: nowrap;
      transition: background 0.2s, color 0.2s;
    }

    .paste-btn:hover { background: rgba(255,45,85,0.1); color: var(--pink); border-color: rgba(255,45,85,0.25); }

    .divider { height: 1px; background: var(--border); }

    .go-btn {
      width: 100%; padding: 15px 20px;
      background: transparent; border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      font-family: 'Geist Mono', monospace;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--pink);
      transition: background 0.2s, opacity 0.2s;
    }

    .go-btn:hover:not(:disabled) { background: rgba(255,45,85,0.08); }
    .go-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .go-btn svg {
      width: 15px; height: 15px;
      stroke: currentColor; stroke-width: 1.8; fill: none;
      transition: transform 0.25s;
    }

    .go-btn:hover:not(:disabled) svg { transform: translateX(4px); }

    .prog-wrap {
      display: none; padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-direction: column; gap: 8px;
    }

    .prog-wrap.show { display: flex; }

    .prog-row {
      font-family: 'Geist Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 0.05em;
    }

    .prog-bar { height: 2px; background: var(--border-s); border-radius: 2px; overflow: hidden; }

    .prog-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      border-radius: 2px; width: 38%;
      animation: indie 1.3s ease-in-out infinite;
    }

    @keyframes indie {
      0% { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }

    .err-msg {
      display: none; padding: 12px 16px;
      background: rgba(255,59,48,0.08);
      border: 1px solid rgba(255,59,48,0.2);
      border-radius: var(--r-sm);
      font-family: 'Geist Mono', monospace;
      font-size: 11px; color: rgba(255,100,100,0.9); line-height: 1.6;
    }

    .err-msg.show { display: block; }

    .result-card {
      display: none; flex-direction: column;
    }

    .result-card.show {
      display: flex;
      animation: up 0.35s ease both;
    }

    .vid-preview {
      position: relative; background: #000;
      border-radius: var(--r) var(--r) 0 0; overflow: hidden;
    }

    .vid-cover {
      width: 100%; display: block;
      object-fit: cover; max-height: 280px; opacity: 0.85;
    }

    .vid-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.88) 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 16px;
    }

    .vid-title {
      font-size: 13px; font-weight: 500; color: #fff;
      line-height: 1.4; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .vid-author { display: flex; align-items: center; gap: 8px; }

    .author-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.3); object-fit: cover;
    }

    .author-name {
      font-family: 'Geist Mono', monospace;
      font-size: 11px; color: rgba(255,255,255,0.85);
    }

    .info-section { padding: 16px 20px; }

    .info-grid {
      display: grid; grid-template-columns: repeat(3,1fr);
      gap: 8px; margin-bottom: 14px;
    }

    .info-cell {
      background: var(--surface-h); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 10px 12px;
      display: flex; flex-direction: column; gap: 3px;
    }

    .info-cell-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--dim);
    }

    .info-cell-val {
      font-family: 'Geist Mono', monospace;
      font-size: 13px; font-weight: 500; color: var(--text);
    }

    .music-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: var(--surface-h); border: 1px solid var(--border);
      border-radius: var(--r-sm); margin-bottom: 14px;
    }

    .music-cover {
      width: 38px; height: 38px; border-radius: 8px;
      object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-s);
    }

    .music-info { flex: 1; min-width: 0; }

    .music-title {
      font-size: 12px; font-weight: 500; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .music-author {
      font-family: 'Geist Mono', monospace;
      font-size: 10px; color: var(--muted); margin-top: 2px;
    }

    .music-badge {
      font-family: 'Geist Mono', monospace; font-size: 9px;
      padding: 2px 7px; background: rgba(50,173,230,0.12);
      border: 1px solid rgba(50,173,230,0.2);
      border-radius: 100px; color: var(--cyan);
      letter-spacing: 0.08em; text-transform: uppercase; flex-shrink: 0;
    }

    .dl-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }

    .dl-btn {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 5px; padding: 12px 8px;
      background: var(--surface-h); border: 1px solid var(--border-s);
      border-radius: var(--r-sm); text-decoration: none;
      transition: transform 0.18s, background 0.18s, border-color 0.18s;
    }

    .dl-btn:hover { transform: translateY(-2px); }

    .dl-btn.mp4:hover { background: rgba(255,59,48,0.12); border-color: rgba(255,59,48,0.3); }
    .dl-btn.mp3:hover { background: rgba(50,173,230,0.12); border-color: rgba(50,173,230,0.3); }
    .dl-btn.bgm:hover { background: rgba(255,45,85,0.12); border-color: rgba(255,45,85,0.3); }

    .dl-icon {
      width: 30px; height: 30px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }

    .dl-btn.mp4 .dl-icon { background: rgba(255,59,48,0.15); }
    .dl-btn.mp3 .dl-icon { background: rgba(50,173,230,0.15); }
    .dl-btn.bgm .dl-icon { background: rgba(255,45,85,0.15); }

    .dl-icon svg { width: 14px; height: 14px; stroke-width: 1.8; fill: none; }
    .dl-btn.mp4 .dl-icon svg { stroke: var(--accent); }
    .dl-btn.mp3 .dl-icon svg { stroke: var(--cyan); }
    .dl-btn.bgm .dl-icon svg { stroke: var(--pink); }

    .dl-label {
      font-family: 'Geist Mono', monospace;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.07em; text-transform: uppercase;
    }

    .dl-btn.mp4 .dl-label { color: var(--accent); }
    .dl-btn.mp3 .dl-label { color: var(--cyan); }
    .dl-btn.bgm .dl-label { color: var(--pink); }

    .dl-sub { font-family: 'Geist Mono', monospace; font-size: 9px; color: var(--dim); }

    footer {
      text-align: center; font-family: 'Geist Mono', monospace;
      font-size: 10px; color: var(--dim);
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="wrap">
  <nav>
    <a class="brand" href="/">
      <div class="brand-logo">
        <img src="/thumbnail.jpg" alt="ST"/>
      </div>
      <div>
        <div class="brand-name">Sauce<span>Tube</span></div>
        <div class="brand-sub">TikTok</div>
      </div>
    </a>
    <button class="theme-btn" id="themeBtn" type="button"></button>
  </nav>

  <div class="hero">
    <div class="hero-badge"><span class="badge-dot"></span> TikTok Downloader</div>
    <h1>Grab <em>TikTok</em><br><strong>without watermark.</strong></h1>
    <p>Video, audio, atau musik — pilih sendiri.</p>
  </div>

  <div class="card" id="mainCard">
    <div class="url-section">
      <div class="url-label">TikTok URL</div>
      <div class="url-row">
        <input class="url-input" id="urlInput" type="text" placeholder="https://vt.tiktok.com/..." autocomplete="off" spellcheck="false"/>
        <button class="paste-btn" id="pasteBtn" type="button">Paste</button>
      </div>
    </div>
    <div class="divider"></div>
    <button class="go-btn" id="goBtn" type="button" disabled>
      <span>Fetch Info</span>
      <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </button>
    <div class="prog-wrap" id="progWrap">
      <div class="prog-row">Fetching...</div>
      <div class="prog-bar"><div class="prog-fill"></div></div>
    </div>
  </div>

  <div class="err-msg" id="errMsg"></div>

  <div class="card result-card" id="resultCard">
    <div class="vid-preview">
      <img class="vid-cover" id="vidCover" src="" alt="cover"/>
      <div class="vid-overlay">
        <div class="vid-title" id="vidTitle"></div>
        <div class="vid-author">
          <img class="author-avatar" id="authorAvatar" src="" alt="avatar"/>
          <span class="author-name" id="authorName"></span>
        </div>
      </div>
    </div>
    <div class="info-section">
      <div class="info-grid">
        <div class="info-cell">
          <div class="info-cell-label">Plays</div>
          <div class="info-cell-val" id="statPlay">-</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Likes</div>
          <div class="info-cell-val" id="statLike">-</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Shares</div>
          <div class="info-cell-val" id="statShare">-</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Comments</div>
          <div class="info-cell-val" id="statComment">-</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Saves</div>
          <div class="info-cell-val" id="statCollect">-</div>
        </div>
        <div class="info-cell">
          <div class="info-cell-label">Duration</div>
          <div class="info-cell-val" id="statDur">-</div>
        </div>
      </div>
      <div class="music-row">
        <img class="music-cover" id="musicCover" src="" alt="music"/>
        <div class="music-info">
          <div class="music-title" id="musicTitle">-</div>
          <div class="music-author" id="musicAuthor">-</div>
        </div>
        <div class="music-badge">Music</div>
      </div>
      <div class="dl-grid">
        <a class="dl-btn mp4" id="dlMp4" href="#" target="_blank" rel="noopener noreferrer">
          <div class="dl-icon">
            <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </div>
          <div class="dl-label">MP4</div>
          <div class="dl-sub">No WM</div>
        </a>
        <a class="dl-btn mp3" id="dlMp3" href="#" target="_blank" rel="noopener noreferrer">
          <div class="dl-icon">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          </div>
          <div class="dl-label">Audio</div>
          <div class="dl-sub">MP3</div>
        </a>
        <a class="dl-btn bgm" id="dlBgm" href="#" target="_blank" rel="noopener noreferrer">
          <div class="dl-icon">
            <svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3z"/><path d="M3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
          </div>
          <div class="dl-label">BGM</div>
          <div class="dl-sub">Music</div>
        </a>
      </div>
    </div>
  </div>

  <footer>SauceTube &mdash; Azazel Codes</footer>
</div>

<script>
(function() {
  // Theme
  var html = document.documentElement;
  var saved = localStorage.getItem('st-theme') || 'dark';
  html.setAttribute('data-theme', saved);

  document.getElementById('themeBtn').addEventListener('click', function() {
    var cur = html.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('st-theme', next);
  });

  // Paste
  document.getElementById('pasteBtn').addEventListener('click', function() {
    navigator.clipboard.readText().then(function(t) {
      document.getElementById('urlInput').value = t;
      checkUrl();
    }).catch(function() {});
  });

  var urlInput = document.getElementById('urlInput');
  var goBtn = document.getElementById('goBtn');

  urlInput.addEventListener('input', checkUrl);

  function checkUrl() {
    var v = urlInput.value.trim();
    goBtn.disabled = !(v.length > 5);
  }

  var progWrap = document.getElementById('progWrap');
  var errMsg = document.getElementById('errMsg');
  var resultCard = document.getElementById('resultCard');

  function showErr(msg) {
    errMsg.textContent = msg;
    errMsg.classList.add('show');
  }

  function hideErr() {
    errMsg.classList.remove('show');
  }

  function fmtNum(n) {
    if (!n || isNaN(n)) return '0';
    n = Number(n);
    if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n/1000).toFixed(1) + 'K';
    return String(n);
  }

  function fmtDur(s) {
    s = Number(s) || 0;
    var m = Math.floor(s / 60);
    var sec = String(Math.floor(s % 60)).padStart(2, '0');
    return m + ':' + sec;
  }

  goBtn.addEventListener('click', function() {
    var url = urlInput.value.trim();
    if (!url) return;

    hideErr();
    resultCard.classList.remove('show');
    progWrap.classList.add('show');
    goBtn.disabled = true;

    fetch('/api/tiktok?url=' + url)
      .then(function(r) {
        if (!r.ok) throw new Error('Request failed: ' + r.status);
        return r.json();
      })
      .then(function(json) {
        if (json.code !== 0 || !json.data) {
          throw new Error(json.msg || 'Failed to fetch TikTok info');
        }

        var d = json.data;

        document.getElementById('vidCover').src = d.cover || d.origin_cover || '';
        document.getElementById('vidTitle').textContent = d.title || '';
        document.getElementById('authorAvatar').src = (d.author && d.author.avatar) ? d.author.avatar : '';
        document.getElementById('authorName').textContent = '@' + ((d.author && d.author.unique_id) ? d.author.unique_id : '');

        document.getElementById('statPlay').textContent = fmtNum(d.play_count);
        document.getElementById('statLike').textContent = fmtNum(d.digg_count);
        document.getElementById('statShare').textContent = fmtNum(d.share_count);
        document.getElementById('statComment').textContent = fmtNum(d.comment_count);
        document.getElementById('statCollect').textContent = fmtNum(d.collect_count);
        document.getElementById('statDur').textContent = fmtDur(d.duration);

        var mi = d.music_info || {};
        document.getElementById('musicCover').src = mi.cover || '';
        document.getElementById('musicTitle').textContent = mi.title || '-';
        document.getElementById('musicAuthor').textContent = mi.author || '-';

        document.getElementById('dlMp4').href = d.play || '#';
        document.getElementById('dlMp3').href = d.music || '#';
        document.getElementById('dlBgm').href = (mi.play || d.music || '#');

        progWrap.classList.remove('show');
        resultCard.classList.add('show');
        goBtn.disabled = false;
      })
      .catch(function(err) {
        progWrap.classList.remove('show');
        goBtn.disabled = false;
        showErr(err.message);
      });
  });
})();
</script>

</body>
</html>
